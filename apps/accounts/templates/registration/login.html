{% extends 'base.html' %}

{% block title %}用户登录 - PC 配置推荐系统{% endblock %}

{% block content %}
<div class="container" style="max-width: 420px;">
  <div class="card fade-in">
    <div class="text-center mb-3">
      <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">欢迎回来</h2>
      <p class="text-muted">请登录您的账号</p>
    </div>

    <form method="post">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="id_username" class="form-label">用户名</label>
        <input 
          id="id_username" 
          type="text" 
          name="username" 
          class="form-control"
          required 
          autofocus
          placeholder="请输入用户名"
        />
      </div>

      <div class="form-group">
        <label for="id_password" class="form-label">密码</label>
        <input 
          id="id_password" 
          type="password" 
          name="password" 
          class="form-control"
          required 
          placeholder="请输入密码"
        />
      </div>

      {% if form.errors %}
        <div class="alert alert-error">
          用户名或密码错误，请重试。
        </div>
      {% endif %}

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
        登录
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'accounts:register' %}" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">
        还没有账号？立即注册 →
      </a>
    </div>
  </div>
</div>
{% endblock %}
