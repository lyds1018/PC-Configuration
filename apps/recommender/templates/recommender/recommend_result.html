{% extends "base.html" %}
{% load static %}

{% block title %}智能推荐结果 - PC 配置推荐系统{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">智能推荐结果</h1>
  <p class="page-subtitle" id="result-subtitle">正在分析你的需求，请稍候...</p>
</div>

<div
  class="agent-shell"
  id="recommend-result-shell"
  data-result-data-url="{% url 'recommender:recommend_result_data' %}"
  data-save-url-pattern="{% url 'build_history:save_recommend_combo' 999999 %}"
  data-back-url="{% url 'recommender:recommend_page' %}"
>
  <div class="card agent-console" id="agent-thinking-card">
    <div class="card-header" id="agent-step-header">读取预算、场景与品牌约束中</div>
    <ul class="agent-log" id="agent-log">
      <li class="agent-log-item">读取预算、场景与品牌约束中...</li>
      <li class="agent-log-item">从候选池筛选兼容组合中...</li>
      <li class="agent-log-item">计算性能分数与性价比中...</li>
      <li class="agent-log-item">调用智能体思考中...</li>
    </ul>
    <div class="agent-progress">
      <div class="agent-progress-fill" id="agent-progress-fill"></div>
    </div>
  </div>

  <div id="agent-result-stage" class="agent-result-stage"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/recommend-result.js' %}?v=20260330-pages-1"></script>
{% endblock %}
