{% extends "base.html" %}

{% block title %}智能推荐结果 - PC 配置推荐系统{% endblock %}

{% block extra_css %}
<style>
  .agent-shell {
    display: grid;
    gap: 1rem;
  }

  .agent-console {
    background: linear-gradient(135deg, #eef5ff 0%, #f8fbff 55%, #f2f8f3 100%);
    border: 1px solid #d6e5ff;
  }

  .agent-log {
    display: grid;
    gap: 0.6rem;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .agent-log-item {
    color: #5f6f8c;
    transition: color 0.2s ease, transform 0.2s ease;
    opacity: 0.45;
  }

  .agent-log-item.active {
    color: #0f2f57;
    opacity: 1;
    transform: translateX(4px);
    font-weight: 600;
  }

  .agent-log-item.done {
    color: #2d6a4f;
    opacity: 1;
  }

  .agent-progress {
    margin-top: 0.75rem;
    width: 100%;
    height: 7px;
    border-radius: 999px;
    background: #dbe7f8;
    overflow: hidden;
  }

  .agent-progress-fill {
    width: 0;
    height: 100%;
    background: linear-gradient(90deg, #2f80ed, #26a69a);
    transition: width 0.25s ease;
  }

  .agent-result-stage {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.28s ease, transform 0.28s ease;
  }

  .agent-result-stage.ready {
    opacity: 1;
    transform: translateY(0);
  }

  .typewriter-wrap {
    line-height: 1.75;
  }

  .typewriter-cursor {
    display: inline-block;
    width: 0.5ch;
    margin-left: 1px;
    animation: blink 0.9s steps(1) infinite;
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">智能推荐结果</h1>
  <p class="page-subtitle" id="result-subtitle">正在分析你的需求，请稍候...</p>
</div>

<div class="agent-shell">
  <div class="card agent-console" id="agent-thinking-card">
    <div class="card-header">智能体思考中</div>
    <ul class="agent-log" id="agent-log">
      <li class="agent-log-item">读取预算、场景与品牌约束...</li>
      <li class="agent-log-item">从候选池筛选兼容组合...</li>
      <li class="agent-log-item">计算性能分数与性价比...</li>
      <li class="agent-log-item">调用智能体思考中...</li>
    </ul>
    <div class="agent-progress">
      <div class="agent-progress-fill" id="agent-progress-fill"></div>
    </div>
  </div>

  <div id="agent-result-stage" class="agent-result-stage"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  (function () {
    const esc = (s) => String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");

    const resultStage = document.getElementById("agent-result-stage");
    const thinkingCard = document.getElementById("agent-thinking-card");
    const subtitleEl = document.getElementById("result-subtitle");
    const logItems = Array.from(document.querySelectorAll("#agent-log .agent-log-item"));
    const progressFill = document.getElementById("agent-progress-fill");
    const total = logItems.length || 1;
    const query = window.location.search || "";
    const dataUrl = "{% url 'recommender:recommend_result_data' %}" + query;
    let payload = null;
    let requestStarted = false;

    const startTypewriter = (summary) => {
      const summaryTextEl = document.getElementById("agent-summary-text");
      const cursorEl = document.getElementById("agent-summary-cursor");
      if (!summaryTextEl) return;
      const fullText = summary || "";
      if (!fullText) {
        if (cursorEl) cursorEl.style.display = "none";
        return;
      }
      summaryTextEl.textContent = "";
      let idx = 0;
      const tick = () => {
        summaryTextEl.textContent = fullText.slice(0, idx);
        idx += 1;
        if (idx <= fullText.length) {
          window.setTimeout(tick, 16);
        } else if (cursorEl) {
          window.setTimeout(() => { cursorEl.style.display = "none"; }, 300);
        }
      };
      tick();
    };

    const renderResult = () => {
      if (!resultStage || !payload) return;
      const meta = payload.meta || {};
      const rows = payload.rows || [];
      const agentEnabled = !!payload.agent_enabled;
      const summary = payload.agent_summary || "";
      const agentReason = payload.agent_reason || "当前未启用智能体推荐。";
      const metaReason = meta.reason || "";

      const rowsHtml = rows.map((row) => `
        <tr>
          <td>
            <div><strong>CPU：</strong>${esc(row.cpu)}</div>
            <div><strong>主板：</strong>${esc(row.mb)}</div>
            <div><strong>内存：</strong>${esc(row.ram)}</div>
            <div><strong>硬盘：</strong>${esc(row.storage)}</div>
            <div><strong>显卡：</strong>${esc(row.gpu)}</div>
            <div><strong>机箱：</strong>${esc(row.case)}</div>
            <div><strong>电源：</strong>${esc(row.psu)}</div>
            <div><strong>散热：</strong>${esc(row.cooler)}</div>
          </td>
          <td>￥${Number(row.total_price || 0).toFixed(2)}</td>
          <td>${Number(row.total_score_100 || 0).toFixed(1)}/100</td>
          <td>${Number(row.combo_value_100 || 0).toFixed(1)}/100</td>
          <td>${esc(row.reason || "—")}</td>
        </tr>
      `).join("");

      resultStage.innerHTML = `
        <div class="card">
          <div class="flex-between" style="gap: 1rem; flex-wrap: wrap;">
            <div class="text-muted">场景：${esc(meta.workload || "")} / 预算区间：${esc(meta.budget_min || "")} - ${esc(meta.budget_max || "")} / 候选池：${esc(meta.candidate_count || 0)}</div>
            <a href="{% url 'recommender:recommend_page' %}" class="btn btn-outline">返回修改条件</a>
          </div>
        </div>
        ${metaReason ? `<div class="alert alert-warning">${esc(metaReason)}</div>` : ""}
        ${rows.length ? `
          <div class="card">
            <div class="card-header">总体建议</div>
            ${agentEnabled
              ? `<div class="typewriter-wrap"><span id="agent-summary-text"></span><span class="typewriter-cursor" id="agent-summary-cursor">|</span></div>`
              : `<div class="text-muted">${esc(agentReason)}</div>`
            }
          </div>
          <div class="card">
            <div class="card-header">推荐结果（${rows.length} 套）</div>
            <div class="table-responsive">
              <table class="table">
                <thead>
                  <tr>
                    <th>方案</th>
                    <th>总价</th>
                    <th>总分</th>
                    <th>性价比</th>
                    <th>智能体评价</th>
                  </tr>
                </thead>
                <tbody>${rowsHtml}</tbody>
              </table>
            </div>
          </div>
        ` : ""}
      `;
      resultStage.classList.add("ready");
      if (agentEnabled) startTypewriter(summary);
    };

    const startRequest = () => {
      if (requestStarted) return;
      requestStarted = true;
      if (!query || query === "?") {
        payload = {
          meta: { reason: "未检测到推荐条件，请返回上一页重新提交。" },
          rows: [],
          agent_enabled: false,
          agent_reason: "",
        };
        return;
      }
      fetch(dataUrl, { credentials: "same-origin" })
        .then((r) => r.json())
        .then((data) => { payload = data; })
        .catch(() => {
          payload = {
            meta: { reason: "推荐数据加载失败，请返回重试。" },
            rows: [],
            agent_enabled: false,
            agent_reason: "推荐数据加载失败，请返回重试。",
          };
        });
    };

    const activeClass = (idx, done) => {
      logItems.forEach((el, i) => {
        el.classList.toggle("active", i === idx && !done);
        if (done && i <= idx) el.classList.add("done");
      });
    };

    const setProgress = (percent) => {
      if (progressFill) progressFill.style.width = `${Math.max(0, Math.min(100, percent))}%`;
    };

    // 阶段1：快速完成前置步骤，到 88%
    const callStepIdx = Math.max(0, total - 1);
    for (let idx = 0; idx < callStepIdx; idx += 1) {
      window.setTimeout(() => {
        activeClass(idx, false);
        const preRatio = (idx + 1) / Math.max(1, callStepIdx);
        setProgress(preRatio * 88);
        window.setTimeout(() => activeClass(idx, true), 220);
      }, idx * 300);
    }

    // 阶段2：调用智能体，与真实请求强绑定。
    const startWaitAt = callStepIdx * 300 + 120;
    let creep = 88;
    const creepTimer = window.setInterval(() => {
      if (payload) return;
      creep = Math.min(96, creep + 0.35);
      setProgress(creep);
    }, 120);

    window.setTimeout(() => {
      activeClass(callStepIdx, false);
      startRequest();
    }, startWaitAt);

    const waitForPayload = () => {
      if (!payload) {
        window.setTimeout(waitForPayload, 120);
        return;
      }
      window.clearInterval(creepTimer);
      activeClass(callStepIdx, true);
      setProgress(100);
      window.setTimeout(() => {
        if (thinkingCard) thinkingCard.style.display = "none";
        renderResult();
        if (subtitleEl) subtitleEl.textContent = "分析完成";
      }, 220);
    };
    waitForPayload();
  })();
</script>
{% endblock %}
