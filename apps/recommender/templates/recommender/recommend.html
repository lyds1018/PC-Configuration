{% extends "base.html" %}

{% block title %}智能推荐 - PC 配置推荐系统{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">智能推荐</h1>
  <p class="page-subtitle">填写需求，查看智能体建议</p>
</div>

<div class="card">
  <div class="card-header">推荐条件</div>
  <form method="get" action="{% url 'recommender:recommend_result_page' %}" class="form-row">
    <div class="form-group">
      <label class="form-label">最低预算（元）</label>
      <input class="form-control" type="number" step="1000" min="0" name="budget_min" value="{{ form_data.budget_min }}" />
    </div>
    <div class="form-group">
      <label class="form-label">最高预算（元）</label>
      <input class="form-control" type="number" step="1000" min="0" name="budget_max" value="{{ form_data.budget_max }}" />
    </div>
    <div class="form-group">
      <label class="form-label">场景</label>
      <select class="form-select" name="workload">
        <option value="game" {% if form_data.workload == "game" %}selected{% endif %}>游戏</option>
        <option value="office" {% if form_data.workload == "office" %}selected{% endif %}>办公</option>
        <option value="productivity" {% if form_data.workload == "productivity" %}selected{% endif %}>生产力</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">CPU品牌</label>
      <select class="form-select" name="cpu_brand">
        <option value="">不限</option>
        {% for brand in cpu_brands %}
          <option value="{{ brand }}" {% if form_data.cpu_brand == brand %}selected{% endif %}>{{ brand }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">GPU芯片品牌</label>
      <select class="form-select" name="gpu_chip_brand">
        <option value="">不限</option>
        {% for brand in gpu_chip_brands %}
          <option value="{{ brand }}" {% if form_data.gpu_chip_brand == brand %}selected{% endif %}>
            {% if brand == "NVIDIA" %}英伟达{% else %}{{ brand }}{% endif %}
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">返回数量</label>
      <input class="form-control" type="number" name="top_k" min="1" max="10" value="{{ form_data.top_k|default:'3' }}" />
    </div>
    <div class="form-group grid-full">
      <label class="form-label">自由输入</label>
      <textarea class="form-control" name="free_text" rows="3" placeholder="例如：主玩 3A 游戏，画质拉满。">{{ form_data.free_text }}</textarea>
    </div>
    <div class="form-group grid-full">
      <button type="submit" class="btn btn-primary">开始智能推荐</button>
    </div>
  </form>
</div>
{% endblock %}
