{% extends "core/base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="panel" style="max-width: 420px; margin: 0 auto;">
    <h2>登录</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">登录</button>
    </form>
    <p class="muted" style="margin-top: 12px;">没有账号？<a href="/accounts/register/">去注册</a></p>
</div>
{% endblock %}
