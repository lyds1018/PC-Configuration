<!doctype html>
<html lang="zh-hans">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PC 兼容装机{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f4ef;
            --panel: #ffffff;
            --ink: #1b1a17;
            --accent: #1f6f5b;
            --muted: #6b6b6b;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Noto Serif SC", "SimSun", serif; background: var(--bg); color: var(--ink); }
        header { padding: 20px 32px; background: var(--panel); border-bottom: 1px solid #e6e2d8; }
        header nav { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        header a { color: var(--ink); text-decoration: none; font-weight: 600; }
        main { padding: 28px 32px 48px; max-width: 1100px; margin: 0 auto; }
        .panel { background: var(--panel); border-radius: 12px; padding: 20px; box-shadow: 0 6px 24px rgba(0,0,0,0.08); }
        .grid { display: grid; gap: 16px; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
        .tag { display: inline-flex; padding: 4px 10px; border-radius: 999px; background: #e8f1ee; color: var(--accent); font-size: 12px; }
        .muted { color: var(--muted); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ece7de; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; background: var(--accent); color: white; text-decoration: none; font-weight: 600; }
        .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .pill { padding: 6px 10px; border-radius: 6px; background: #f0ece4; font-size: 12px; }
        form.inline { display: flex; gap: 8px; flex-wrap: wrap; }
        input[type="text"], input[type="number"], input[type="password"] { padding: 8px 10px; border-radius: 6px; border: 1px solid #ddd6c7; }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="/">首页</a>
        <a href="/builder/">装机配置</a>
        {% if user.is_authenticated %}
            <span class="tag">{{ user.username }}</span>
            <a href="/accounts/logout/">退出</a>
        {% else %}
            <a href="/accounts/login/">登录</a>
            <a href="/accounts/register/">注册</a>
        {% endif %}
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
