<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>用户登录</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --brand: #5b5b85;
        --text: #1f2330;
        --muted: #6c7487;
        --card: #ffffff;
        --accent: #2c7be5;
        --accent-dark: #2367bc;
        --line: #e4e7ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        background: var(--brand);
        color: #fff;
        text-align: center;
        padding: 28px 16px;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .container {
        max-width: 420px;
        margin: 40px auto;
        padding: 0 18px;
      }

      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 26px;
        box-shadow: 0 14px 36px rgba(21, 32, 56, 0.12);
      }

      h2 {
        margin: 0 0 16px;
        font-size: 20px;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 600;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--line);
      }

      button {
        margin-top: 18px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .error {
        margin: 12px 0 0;
        color: #d64545;
        font-size: 14px;
      }

      .register-link {
        display: inline-block;
        margin-top: 12px;
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>DIY主机平台</header>
    <div class="container">
      <div class="card">
        <h2>请输入账号信息</h2>
        <form method="post">
          {% csrf_token %}
          <label for="id_username">用户名</label>
          <input id="id_username" type="text" name="username" required />

          <label for="id_password">密码</label>
          <input id="id_password" type="password" name="password" required />

          <button type="submit">登录</button>
        </form>
        <a class="register-link" href="{% url 'register' %}">没有账号？注册</a>
        {% if form.errors %}
          <div class="error">用户名或密码错误，请重试。</div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
