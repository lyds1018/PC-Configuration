<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>登录</title>
  </head>
  <body>
    <h1>登录</h1>
    {% if form.errors %}
      <p>用户名或密码不正确，请重试。</p>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">登录</button>
    </form>
  </body>
</html>
